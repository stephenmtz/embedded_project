x-base: &base
  restart: unless-stopped
  network_mode: host
  volumes:
    - /dev/shm:/dev/shm
    - /tmp/iceoryx2:/tmp/iceoryx2

services:

  realsense_driver:
    <<: *base
    build:
      context: .
      dockerfile: nodes/realsense_driver/Dockerfile
    container_name: realsense_driver
    devices:
      - /dev/video0:/dev/video0
      - /dev/video2:/dev/video2
      - /dev/video4:/dev/video4
      - /dev/video6:/dev/video6
      - /dev/video7:/dev/video7
      - /dev/video9:/dev/video9
      - /dev/video11:/dev/video11
      - /dev/video13:/dev/video13
      - /dev/video14:/dev/video14
      - /dev/video16:/dev/video16
      - /dev/video18:/dev/video18
      - /dev/video20:/dev/video20
      - /dev/media0:/dev/media0
    group_add:
      - video
    volumes:
      - /dev/shm:/dev/shm
      - /tmp/iceoryx2:/tmp/iceoryx2
      - /run/udev:/run/udev:ro
    environment:
      - RS_CAMERA_INDEX=0
      - RS_WIDTH=1280
      - RS_HEIGHT=720
      - RS_FPS=30
